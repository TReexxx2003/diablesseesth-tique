<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Diablesse Esthétique</title>

    <!-- Librairie d'animations -->
    <link href="https://image2url.com/r2/bucket2/images/1775958004965-7dac710f-236d-4441-b38e-3300a9d7cebe.jpg" rel="stylesheet">
    <script src="https://image2url.com/r2/bucket2/images/1775958004965-7dac710f-236d-4441-b38e-3300a9d7cebe.jpg"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            scroll-behavior: smooth;
        }

        nav {
            background: #000;
            padding: 15px;
            position: fixed;
            width: 100%;
            top: 0;
            box-shadow: 0 2px 10px #ff00ff;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
        }

        nav a:hover {
            color: #ff00ff;
        }

        section {
            padding: 120px 20px;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            color: #ff00ff;
        }

        img {
            width: 300px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 0 20px #ff00ff;
        }

        #accueil { background: #111; }
        #apropos { background: #1a1a1a; }
        #galerie { background: #222; }
    </style>
</head>
<body>

<nav>
    <a href="#accueil">Accueil</a>
    <a href="#apropos">À propos</a>
    <a href="#galerie">Galerie</a>
</nav>

<section id="accueil" data-aos="fade-up">
    <h1>Bienvenue sur Diablesse Esthétique👑</h1>
    <p>Regarde l'animation quand tu scroll</p>
    <img src="https://image2url.com/r2/bucket2/images/1775958004965-7dac710f-236d-4441-b38e-3300a9d7cebe.jpg" alt="image">
</section>

<section id="apropos" data-aos="fade-right">
    <h1>À propos</h1>
    <p>distribution de produit de cils et autres💫</p>
    <img src="https://image2url.com/r2/bucket2/images/1775958004965-7dac710f-236d-4441-b38e-3300a9d7cebe.jpg" alt="image">
</section>

<section id="galerie" data-aos="zoom-in">
    <h1>Galerie</h1>
    <p>Des images avec effet stylé.</p>
    <img src="https://image2url.com/r2/bucket2/images/1775958004965-7dac710f-236d-4441-b38e-3300a9d7cebe.jpg" alt="image">
</section>

<script>
    AOS.init();
</script>

</body>
</html>
